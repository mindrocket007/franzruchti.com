<html lang="de">

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3348;
    --text: #e8eaed;
    --text-secondary: #9aa0b4;
    --accent: #6366f1;
    --accent-light: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --blue: #3b82f6;
    --purple: #a855f7;
    --cyan: #06b6d4;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .app { max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }
  .header h1 {
    font-size: 2.2em;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-light), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { color: var(--text-secondary); font-size: 1.05em; max-width: 700px; margin: 0 auto; }

  /* Navigation */
  .nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
    padding: 0 10px;
  }
  .nav button {
    padding: 10px 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.88em;
    font-weight: 500;
    transition: all 0.2s;
    font-family: inherit;
  }
  .nav button:hover { border-color: var(--accent); color: var(--text); }
  .nav button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 1.35em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card h3 {
    font-size: 1.05em;
    color: var(--accent-light);
    margin: 18px 0 10px;
  }
  .card-subtitle { color: var(--text-secondary); font-size: 0.92em; margin-bottom: 18px; }

  /* Phase indicator */
  .phase-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .phase-1 { background: rgba(99,102,241,0.15); color: var(--accent-light); }
  .phase-2 { background: rgba(6,182,212,0.15); color: var(--cyan); }
  .phase-3 { background: rgba(34,197,94,0.15); color: var(--green); }
  .phase-4 { background: rgba(168,85,247,0.15); color: var(--purple); }

  /* Checklist */
  .checklist { list-style: none; }
  .checklist li {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 0.94em;
    line-height: 1.5;
  }
  .checklist li:hover { background: var(--surface2); }
  .check-box {
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 2px solid var(--border);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: all 0.2s;
  }
  .check-box.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .check-box.checked::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
  .checklist li.done .check-text { text-decoration: line-through; color: var(--text-secondary); }

  /* Question cards */
  .q-card {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    border-radius: 0 10px 10px 0;
    margin-bottom: 10px;
    font-size: 0.94em;
  }
  .q-card .q-role {
    font-size: 0.78em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .q-card.ceo { border-left-color: var(--yellow); }
  .q-card.ceo .q-role { color: var(--yellow); }
  .q-card.cfo { border-left-color: var(--green); }
  .q-card.cfo .q-role { color: var(--green); }
  .q-card.coo { border-left-color: var(--orange); }
  .q-card.coo .q-role { color: var(--orange); }
  .q-card.strategy { border-left-color: var(--purple); }
  .q-card.strategy .q-role { color: var(--purple); }
  .q-card.market { border-left-color: var(--cyan); }
  .q-card.market .q-role { color: var(--cyan); }
  .q-card.hr { border-left-color: var(--red); }
  .q-card.hr .q-role { color: var(--red); }

  /* KPI Grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-top: 14px;
  }
  .kpi-item {
    background: var(--surface2);
    padding: 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .kpi-item .kpi-label { font-size: 0.82em; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .kpi-item .kpi-name { font-weight: 600; margin-bottom: 6px; }
  .kpi-item .kpi-desc { font-size: 0.85em; color: var(--text-secondary); line-height: 1.4; }
  .kpi-item .kpi-target { font-size: 0.85em; color: var(--green); margin-top: 6px; font-weight: 500; }

  /* Stakeholder map */
  .stakeholder-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .stakeholder-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 18px;
    border: 1px solid var(--border);
  }
  .stakeholder-card .sh-name { font-weight: 600; font-size: 1em; margin-bottom: 2px; }
  .stakeholder-card .sh-freq { font-size: 0.8em; color: var(--accent-light); margin-bottom: 8px; }
  .stakeholder-card .sh-topics { font-size: 0.88em; color: var(--text-secondary); }
  .sh-priority {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72em;
    font-weight: 600;
    margin-left: 8px;
  }
  .sh-priority.high { background: rgba(239,68,68,0.15); color: var(--red); }
  .sh-priority.medium { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .sh-priority.low { background: rgba(34,197,94,0.15); color: var(--green); }

  /* Timeline */
  .timeline { position: relative; padding-left: 30px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 24px;
    padding: 16px 20px;
    background: var(--surface2);
    border-radius: 10px;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -26px;
    top: 20px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
  }
  .timeline-item .tl-period { font-size: 0.8em; font-weight: 600; color: var(--accent-light); margin-bottom: 4px; }
  .timeline-item .tl-title { font-weight: 600; margin-bottom: 6px; }
  .timeline-item .tl-desc { font-size: 0.9em; color: var(--text-secondary); }

  /* Tabs within sections */
  .subtabs {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    flex-wrap: wrap;
  }
  .subtabs button {
    padding: 6px 14px;
    border: none;
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.88em;
    font-weight: 500;
    border-radius: 6px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .subtabs button:hover { color: var(--text); background: var(--surface2); }
  .subtabs button.active { color: var(--accent-light); background: rgba(99,102,241,0.1); }

  /* Progress bar */
  .progress-bar { background: var(--surface2); height: 8px; border-radius: 4px; margin: 14px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 4px; transition: width 0.4s; }

  /* Denkweise section */
  .mindset-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .mindset-card {
    background: var(--surface2);
    padding: 20px;
    border-radius: 10px;
    border-top: 3px solid var(--accent);
  }
  .mindset-card h4 { margin-bottom: 8px; font-size: 1em; }
  .mindset-card p { font-size: 0.9em; color: var(--text-secondary); line-height: 1.5; }

  /* Wochenplan */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  @media (max-width: 900px) { .week-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 500px) { .week-grid { grid-template-columns: 1fr; } }
  .day-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px;
    border-top: 2px solid var(--border);
  }
  .day-card .day-name { font-weight: 700; font-size: 0.85em; margin-bottom: 10px; color: var(--accent-light); }
  .day-card .day-item {
    font-size: 0.82em;
    padding: 5px 0;
    border-bottom: 1px solid rgba(46,51,72,0.5);
    color: var(--text-secondary);
  }
  .day-card .day-item:last-child { border: none; }
  .day-card .day-item .time { color: var(--text); font-weight: 500; }

  /* Notes area */
  .notes-area {
    width: 100%;
    min-height: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.92em;
    resize: vertical;
    outline: none;
    margin-top: 10px;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--text-secondary); }

  /* Grid 2 col */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Decision framework */
  .decision-step {
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    align-items: flex-start;
  }
  .decision-num {
    width: 32px;
    height: 32px;
    min-width: 32px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85em;
  }
  .decision-content h4 { font-size: 0.95em; margin-bottom: 3px; }
  .decision-content p { font-size: 0.88em; color: var(--text-secondary); }

  .highlight-box {
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 10px;
    padding: 18px;
    margin: 14px 0;
  }
  .highlight-box p { font-size: 0.92em; color: var(--text-secondary); line-height: 1.6; }
  .highlight-box strong { color: var(--text); }
</style>
</head>

function App() {
  const [section, setSection] = useState('overview');
  const [checks, setChecks] = useState({});
  const [notes, setNotes] = useState('');
  const [qFilter, setQFilter] = useState(Object.keys(CEO_QUESTIONS)[0]);
  const [stratTab, setStratTab] = useState('frameworks');
  const [commsTab, setCommsTab] = useState('intern');
  const [riskTab, setRiskTab] = useState('risks');
  const [kpiFilter, setKpiFilter] = useState('Alle');

  const toggleCheck = useCallback((phase, idx) => {
    const key = `${phase}-${idx}`;
    setChecks(prev => ({ ...prev, [key]: !prev[key] }));
  }, []);

  const countDone = (phase, tasks) => tasks.filter((_, i) => checks[`${phase}-${i}`]).length;

  const renderChecklist = (phase, tasks) => (
    <ul className="checklist">
      {tasks.map((t, i) => (
        <li key={i} className={checks[`${phase}-${i}`] ? 'done' : ''} onClick={() => toggleCheck(phase, i)}>
          <div className={`check-box ${checks[`${phase}-${i}`] ? 'checked' : ''}`}></div>
          <span className="check-text">{t.text}</span>
        </li>
      ))}
    </ul>
  );

  const renderProgress = (phase, tasks) => {
    const done = countDone(phase, tasks);
    const pct = Math.round((done / tasks.length) * 100);
    return (
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.85em', color: 'var(--text-secondary)' }}>
          <span>{done} von {tasks.length} erledigt</span>
          <span>{pct}%</span>
        </div>
        <div className="progress-bar"><div className="progress-fill" style={{ width: `${pct}%` }}></div></div>
      </div>
    );
  };

  // ---- SECTIONS ----

  const renderOverview = () => (
    <div>
      <div className="card">
        <h2>Willkommen, CEO der SIZ AG</h2>
        <p className="card-subtitle">Dieses Playbook simuliert, wie ein neu eingestellter CEO der SIZ AG vom ersten Tag an vorgeht – Schritt für Schritt, von der Analyse bis zur Umsetzung.</p>

        <div className="highlight-box">
          <p><strong>SIZ AG auf einen Blick:</strong> Führende ICT-Prüfungsorganisation der Schweiz. ~100'000 Prüfungen/Jahr. 100+ Partnerschulen. Getragen von Swico und Kaufmännischem Verband. Rund 15–20 Mitarbeitende. Sitz: Zürich. Kein Schulungsanbieter – reiner Prüfungs- und Zertifizierungsanbieter.</p>
        </div>
      </div>

      <div className="card">
        <h2>Die 100-Tage-Roadmap</h2>
        <div className="timeline">
          <div className="timeline-item">
            <div className="tl-period">Tag 1–30: ZUHÖREN & VERSTEHEN</div>
            <div className="tl-title">Bestandsaufnahme – Alles aufsaugen</div>
            <div className="tl-desc">Menschen kennenlernen, Zahlen verstehen, Partner besuchen, Wettbewerb analysieren, Kultur fühlen. Keine grossen Entscheide. Dein einziger Job: die richtigen Fragen stellen und zuhören.</div>
          </div>
          <div className="timeline-item">
            <div className="tl-period">Tag 31–60: ANALYSIEREN & FORMEN</div>
            <div className="tl-title">Strategie entwickeln – Klarheit schaffen</div>
            <div className="tl-desc">SWOT erstellen, KPIs definieren, Quick Wins identifizieren, strategische Prioritäten setzen. Erste Hypothesen testen. VR-Strategie-Workshop planen.</div>
          </div>
          <div className="timeline-item">
            <div className="tl-period">Tag 61–100: UMSETZEN & KOMMUNIZIEREN</div>
            <div className="tl-title">Loslegen – Ergebnisse liefern</div>
            <div className="tl-desc">Strategie präsentieren, operative Ziele setzen, erste Initiativen lancieren, Rhythmus etablieren. 100-Tage-Bilanz ziehen.</div>
          </div>
        </div>
      </div>

      <div className="card">
        <h2>Gesamtfortschritt</h2>
        <p className="card-subtitle">Dein Fortschritt über alle Phasen hinweg</p>
        {renderProgress('p1', PHASE1_TASKS)}
        <p style={{ fontSize: '0.82em', color: 'var(--text-secondary)', marginTop: 4 }}>Phase 1: Tag 1–30</p>
        {renderProgress('p2', PHASE2_TASKS)}
        <p style={{ fontSize: '0.82em', color: 'var(--text-secondary)', marginTop: 4 }}>Phase 2: Tag 31–60</p>
        {renderProgress('p3', PHASE3_TASKS)}
        <p style={{ fontSize: '0.82em', color: 'var(--text-secondary)', marginTop: 4 }}>Phase 3: Tag 61–100</p>
      </div>
    </div>
  );

  const renderPhase = (title, subtitle, badge, phase, tasks) => (
    <div className="card">
      <h2><span className={`phase-badge ${badge}`}>{title.split(':')[0]}</span> {title.split(':').slice(1).join(':')}</h2>
      <p className="card-subtitle">{subtitle}</p>
      {renderProgress(phase, tasks)}
      <div style={{ marginTop: 18 }}>{renderChecklist(phase, tasks)}</div>
    </div>
  );

  const renderKPIs = () => {
    const cats = ['Alle', ...new Set(KPI_DATA.map(k => k.cat))];
    const filtered = kpiFilter === 'Alle' ? KPI_DATA : KPI_DATA.filter(k => k.cat === kpiFilter);
    return (
      <div className="card">
        <h2>KPI-Dashboard des CEO</h2>
        <p className="card-subtitle">Die 15+ wichtigsten Kennzahlen, die du als CEO wöchentlich/monatlich im Blick haben musst</p>

              <div className="kpi-target">{k.target}</div>
            </div>

        </div>

            <div className="sh-freq">{s.freq}</div>
            <div className="sh-topics">{s.topics}</div>
          </div>
        ))}
      </div>
    </div>
  );

  const renderQuestions = () => {
    const cats = Object.keys(CEO_QUESTIONS);
    return (
      <div className="card">
        <h2>Fragenkatalog – Was fragt sich ein CEO?</h2>
        <p className="card-subtitle">Die strategischen Fragen, die ein CEO sich stellt – sortiert nach Thema und Perspektive</p>
        <div className="subtabs">
          {cats.map(c => <button key={c} className={qFilter === c ? 'active' : ''} onClick={() => setQFilter(c)}>{c}</button>)}
        </div>
        {CEO_QUESTIONS[qFilter].map((q, i) => (
          <div className={`q-card ${q.cls}`} key={i}>
            <div className="q-role">{q.role}-Perspektive</div>
            <div>{q.q}</div>
          </div>
        ))}
      </div>

              { n: '5', t: 'Entscheiden und kommunizieren', d: 'Klar entscheiden, begründen und kommunizieren. "Wir machen X weil Y. Ich erwarte Z bis dann."' },
              { n: '6', t: 'Messen und korrigieren', d: 'KPI definieren, Review-Datum setzen. Wenn nach 3 Monaten keine Resultate: Kurs korrigieren. Keine Angst vor Richtungswechsel.' },
            ].map((s, i) => (
              <div className="decision-step" key={i}>
                <div className="decision-num">{s.n}</div>
                <div className="decision-content"><h4>{s.t}</h4><p>{s.d}</p></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  const renderWeekplan = () => (
    <div className="card">
      <h2>Idealer Wochenrhythmus</h2>
      <p className="card-subtitle">So organisiert sich ein CEO – Struktur gibt Freiheit für das Wichtige</p>
      <div className="week-grid">
        {Object.entries(WEEK_PLAN).map(([day, items]) => (
          <div className="day-card" key={day}>
            <div className="day-name">{day}</div>
            {items.map((item, i) => (
              <div className="day-item" key={i}><span className="time">{item.time}</span> – {item.item}</div>
            ))}
          </div>
        ))}
      </div>
      <div className="highlight-box" style={{ marginTop: 20 }}>
        <p><strong>Goldene Regel:</strong> Mindestens 30% deiner Zeit muss für strategische Arbeit und Denken reserviert sein. Wenn dein Kalender nur aus Meetings besteht, managst du – aber du führst nicht.</p>
      </div>
    </div>
  );

  const renderMindset = () => (
    <div className="card">
      <h2>CEO-Denkweise & Selbstmanagement</h2>
      <p className="card-subtitle">Wie denkt ein erfolgreicher CEO? Prinzipien für Führung und Selbstführung</p>
      <div className="mindset-grid">
        {MINDSET_ITEMS.map((m, i) => (
          <div className="mindset-card" key={i}>
            <h4>{m.title}</h4>
            <p>{m.text}</p>
          </div>
        ))}
      </div>
    </div>
  );

  const renderComms = () => (
    <div className="card">
      <h2>Kommunikationsstrategie</h2>
      <p className="card-subtitle">Was kommuniziert ein CEO wann, wie und an wen?</p>
      <div className="subtabs">
        <button className={commsTab === 'intern' ? 'active' : ''} onClick={() => setCommsTab('intern')}>Intern</button>
        <button className={commsTab === 'extern' ? 'active' : ''} onClick={() => setCommsTab('extern')}>Extern</button>
      </div>
      {COMMS_DATA[commsTab].map((c, i) => (
        <div key={i} style={{ marginBottom: 16 }}>
          <h3 style={{ fontSize: '1em', color: 'var(--text)', marginBottom: 4 }}>{c.what}</h3>
          <p style={{ fontSize: '0.9em', color: 'var(--text-secondary)', marginBottom: 4 }}><strong style={{ color: 'var(--accent-light)' }}>Wie:</strong> {c.how}</p>
          <p style={{ fontSize: '0.9em', color: 'var(--text-secondary)' }}><strong style={{ color: 'var(--green)' }}>Warum:</strong> {c.why}</p>
        </div>
      ))}
    </div>
  );

  const renderRisks = () => (
    <div className="card">
      <h2>Risiken & Chancen</h2>
      <p className="card-subtitle">Was hält dich nachts wach – und was sollte dich morgens begeistern?</p>
      <div className="subtabs">
        <button className={riskTab === 'risks' ? 'active' : ''} onClick={() => setRiskTab('risks')}>Risiken</button>
        <button className={riskTab === 'chances' ? 'active' : ''} onClick={() => setRiskTab('chances')}>Chancen</button>
      </div>
      {RISKS_CHANCES[riskTab].map((r, i) => (
        <div key={i} style={{ marginBottom: 20, padding: '16px 20px', background: 'var(--surface2)', borderRadius: 10, borderLeft: `3px solid ${riskTab === 'risks' ? 'var(--red)' : 'var(--green)'}` }}>
          <h3 style={{ fontSize: '1em', color: 'var(--text)', marginBottom: 4 }}>{r.title}</h3>
          <p style={{ fontSize: '0.9em', color: 'var(--text-secondary)', marginBottom: 8 }}>{r.desc}</p>
          <p style={{ fontSize: '0.88em', color: riskTab === 'risks' ? 'var(--yellow)' : 'var(--green)' }}><strong>Massnahme:</strong> {r.action}</p>
        </div>
      ))}
    </div>
  );

  const renderNotes = () => (
    <div className="card">
      <h2>Meine CEO-Notizen</h2>
      <p className="card-subtitle">Dein persönlicher Raum für Gedanken, Entscheide und Reflexionen</p>
      <textarea
        className="notes-area"
        value={notes}
        onChange={e => setNotes(e.target.value)}
        placeholder="Schreibe hier deine Gedanken, Entscheide, offenen Fragen und Reflexionen auf..."
        rows={15}
      />
      <p style={{ fontSize: '0.8em', color: 'var(--text-secondary)', marginTop: 8 }}>Tipp: Nutze diesen Bereich, um nach jeder Phase deine wichtigsten Erkenntnisse festzuhalten.</p>
    </div>
  );

  const sectionMap = {
    overview: renderOverview,
    phase1: () => renderPhase('Phase 1: Zuhören & Verstehen (Tag 1–30)', 'Dein einziger Job in den ersten 30 Tagen: Fragen stellen, zuhören, alles aufsaugen. Noch keine grossen Entscheide.', 'phase-1', 'p1', PHASE1_TASKS),
    phase2: () => renderPhase('Phase 2: Analysieren & Formen (Tag 31–60)', 'Jetzt formst du dein Bild. SWOT, KPIs, Quick Wins, strategische Prioritäten. Du beginnst, deine Handschrift zu hinterlassen.', 'phase-2', 'p2', PHASE2_TASKS),
    phase3: () => renderPhase('Phase 3: Umsetzen & Kommunizieren (Tag 61–100)', 'Strategie präsentieren, Ziele setzen, erste Initiativen lancieren, Rhythmus finden. Ab jetzt zählen Resultate.', 'phase-3', 'p3', PHASE3_TASKS),
    kpis: renderKPIs,
    stakeholders: renderStakeholders,
    questions: renderQuestions,
    strategy: renderStrategy,
    weekplan: renderWeekplan,
    mindset: renderMindset,
    comms: renderComms,
    risks: renderRisks,
    notes: renderNotes,
  };

  return (
    <div>
      <div className="header">
        <h1>CEO SIZ AG Agent</h1>
        <p>Dein virtueller Sparringpartner – so denkt, plant und handelt ein CEO der SIZ AG. Von Tag 1 bis zum laufenden Betrieb.</p>
      </div>
      <nav className="nav">
        {SECTIONS.map(s => (
          <button key={s.id} className={section === s.id ? 'active' : ''} onClick={() => setSection(s.id)}>
            {s.label}
          </button>
        ))}
      </nav>
      {sectionMap[section]()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
