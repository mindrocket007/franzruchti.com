<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO SIZ AG – Agentensystem</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0c10; --surface: #12151e; --surface2: #1a1e2e; --surface3: #232840;
    --border: #2a3050; --border-light: #3a4060;
    --text: #e8eaef; --text2: #8890aa; --text3: #5a6080;
    --accent: #6366f1; --accent-light: #818cf8; --accent-dim: rgba(99,102,241,0.12);
    --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
    --yellow: #eab308; --yellow-dim: rgba(234,179,8,0.12);
    --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
    --orange: #f97316; --orange-dim: rgba(249,115,22,0.12);
    --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.12);
    --purple: #a855f7; --purple-dim: rgba(168,85,247,0.12);
    --cyan: #06b6d4; --cyan-dim: rgba(6,182,212,0.12);
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header {
    text-align: center; padding: 40px 20px 30px;
    background: linear-gradient(180deg, rgba(99,102,241,0.06) 0%, transparent 100%);
    border-bottom: 1px solid var(--border); margin-bottom: 30px;
    position: relative;
  }
  .header::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--cyan), var(--purple));
  }
  .header-badge {
    display: inline-block; background: var(--accent-dim); color: var(--accent-light);
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(99,102,241,0.25); margin-bottom: 14px;
  }
  .header h1 {
    font-size: 2.4em; font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, var(--accent-light) 50%, var(--cyan) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .header p { color: var(--text2); font-size: 1.05em; max-width: 600px; margin: 0 auto; }
  .header .date { color: var(--text3); font-size: 0.85em; margin-top: 8px; }

  /* Nav */
  .nav { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
  .nav-btn {
    padding: 10px 18px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); border-radius: 10px; cursor: pointer; font-size: 0.85em;
    font-weight: 500; transition: all 0.2s; font-family: inherit; display: flex; align-items: center; gap: 6px;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }
  .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .nav-btn .nav-icon { font-size: 1.1em; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; margin-bottom: 20px; transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-light); }
  .card h2 { font-size: 1.3em; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .card h3 { font-size: 1em; color: var(--accent-light); margin: 20px 0 10px; }
  .card-sub { color: var(--text2); font-size: 0.9em; margin-bottom: 18px; line-height: 1.5; }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } .grid-4 { grid-template-columns: 1fr 1fr; } }

  /* Module tiles */
  .module-tile {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .module-tile:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .module-tile .tile-icon { font-size: 2em; margin-bottom: 12px; }
  .module-tile h3 { font-size: 1.05em; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .module-tile p { font-size: 0.85em; color: var(--text2); line-height: 1.5; }
  .module-tile .tile-tag {
    display: inline-block; font-size: 0.7em; font-weight: 600; padding: 3px 10px;
    border-radius: 12px; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* KPI cards */
  .kpi-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; text-align: center;
  }
  .kpi-card .kpi-icon { font-size: 1.5em; margin-bottom: 8px; }
  .kpi-card .kpi-value { font-size: 1.8em; font-weight: 800; margin-bottom: 2px; }
  .kpi-card .kpi-label { font-size: 0.78em; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-card .kpi-trend { font-size: 0.8em; margin-top: 6px; font-weight: 600; }
  .kpi-trend.up { color: var(--green); }
  .kpi-trend.down { color: var(--red); }
  .kpi-trend.neutral { color: var(--yellow); }

  /* Task list */
  .task-item {
    display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px;
    border-radius: 10px; margin-bottom: 4px; cursor: pointer; transition: background 0.15s;
  }
  .task-item:hover { background: var(--surface2); }
  .task-check {
    width: 22px; height: 22px; min-width: 22px; border: 2px solid var(--border);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.2s; font-size: 12px;
  }
  .task-check.done { background: var(--green); border-color: var(--green); color: white; }
  .task-text { flex: 1; font-size: 0.92em; line-height: 1.5; }
  .task-text.done { text-decoration: line-through; color: var(--text2); }
  .task-priority {
    font-size: 0.7em; font-weight: 600; padding: 2px 8px; border-radius: 10px;
    text-transform: uppercase; white-space: nowrap;
  }
  .priority-high { background: var(--red-dim); color: var(--red); }
  .priority-medium { background: var(--yellow-dim); color: var(--yellow); }
  .priority-low { background: var(--green-dim); color: var(--green); }

  /* Timeline */
  .timeline-item {
    position: relative; padding-left: 30px; margin-bottom: 20px;
  }
  .timeline-item::before {
    content: ''; position: absolute; left: 8px; top: 30px; bottom: -20px;
    width: 2px; background: var(--border);
  }
  .timeline-item:last-child::before { display: none; }
  .timeline-dot {
    position: absolute; left: 0; top: 6px; width: 18px; height: 18px;
    border-radius: 50%; border: 3px solid var(--bg);
  }
  .timeline-content {
    background: var(--surface2); border-radius: 10px; padding: 16px 20px;
    border: 1px solid var(--border);
  }
  .timeline-time { font-size: 0.8em; font-weight: 600; margin-bottom: 4px; }
  .timeline-title { font-weight: 600; margin-bottom: 4px; }
  .timeline-desc { font-size: 0.88em; color: var(--text2); }

  /* Meeting card */
  .meeting-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 12px; border-left: 3px solid var(--accent);
  }
  .meeting-card .meeting-time { font-size: 0.8em; font-weight: 700; color: var(--accent-light); margin-bottom: 4px; }
  .meeting-card .meeting-title { font-weight: 700; margin-bottom: 6px; }
  .meeting-card .meeting-prep { font-size: 0.88em; color: var(--text2); line-height: 1.5; }
  .meeting-card .meeting-questions { margin-top: 10px; list-style: none; }
  .meeting-card .meeting-questions li {
    padding: 6px 0; font-size: 0.88em; color: var(--text2);
    border-bottom: 1px solid rgba(42,48,80,0.5); display: flex; gap: 8px;
  }
  .meeting-card .meeting-questions li:last-child { border: none; }
  .meeting-card .meeting-questions li::before { content: '?'; color: var(--accent-light); font-weight: 700; }
  .meeting-goal {
    margin-top: 10px; padding: 10px 14px; background: var(--accent-dim);
    border-radius: 8px; font-size: 0.85em; color: var(--accent-light);
  }

  /* Chat interface */
  .chat-container { display: flex; flex-direction: column; height: 500px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg {
    max-width: 85%; padding: 14px 18px; border-radius: 14px; font-size: 0.92em; line-height: 1.6;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg.ceo {
    background: var(--surface2); border: 1px solid var(--border); align-self: flex-start;
    border-left: 3px solid var(--accent);
  }
  .chat-msg.ceo .sender { font-size: 0.75em; font-weight: 700; color: var(--accent-light); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .chat-msg.user { background: var(--accent); color: white; align-self: flex-end; border-radius: 14px 14px 4px 14px; }
  .chat-msg.system {
    background: var(--accent-dim); border: 1px solid rgba(99,102,241,0.2);
    align-self: center; text-align: center; font-size: 0.85em; color: var(--text2); max-width: 90%;
  }
  .chat-input-row { display: flex; gap: 10px; padding-top: 14px; border-top: 1px solid var(--border); }
  .chat-input {
    flex: 1; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.92em; outline: none;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text3); }
  .chat-send {
    padding: 12px 22px; background: var(--accent); color: white; border: none;
    border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.9em; transition: background 0.15s;
  }
  .chat-send:hover { background: var(--accent-light); }

  /* Quick actions */
  .quick-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .quick-btn {
    padding: 7px 14px; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px; cursor: pointer; font-size: 0.82em;
    font-family: inherit; transition: all 0.15s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); background: var(--accent-dim); }

  /* Planner */
  .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  @media (max-width: 900px) { .week-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 500px) { .week-grid { grid-template-columns: 1fr; } }
  .day-col {
    background: var(--surface2); border-radius: 12px; padding: 16px; border-top: 3px solid var(--border);
  }
  .day-col.today { border-top-color: var(--accent); }
  .day-name { font-weight: 700; font-size: 0.85em; color: var(--accent-light); margin-bottom: 12px; }
  .day-slot {
    font-size: 0.82em; padding: 6px 0; border-bottom: 1px solid rgba(42,48,80,0.3);
    color: var(--text2);
  }
  .day-slot:last-child { border: none; }
  .day-slot .slot-time { color: var(--text); font-weight: 500; }

  /* Textarea */
  .text-area {
    width: 100%; min-height: 100px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; color: var(--text); font-family: inherit;
    font-size: 0.9em; resize: vertical; outline: none;
  }
  .text-area:focus { border-color: var(--accent); }
  .text-area::placeholder { color: var(--text3); }

  /* Button */
  .btn {
    padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-weight: 600; font-size: 0.88em; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--text); }

  /* Alert */
  .alert {
    padding: 16px 20px; border-radius: 12px; margin-bottom: 16px;
    display: flex; align-items: flex-start; gap: 12px; font-size: 0.9em;
  }
  .alert-red { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.25); }
  .alert-yellow { background: var(--yellow-dim); border: 1px solid rgba(234,179,8,0.25); }
  .alert-green { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.25); }
  .alert-blue { background: var(--blue-dim); border: 1px solid rgba(59,130,246,0.25); }
  .alert-icon { font-size: 1.3em; }

  /* Stakeholder */
  .sh-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 18px;
  }
  .sh-card .sh-name { font-weight: 700; margin-bottom: 2px; }
  .sh-card .sh-role { font-size: 0.82em; color: var(--text2); margin-bottom: 8px; }
  .sh-card .sh-topics { font-size: 0.85em; color: var(--text2); line-height: 1.5; }

  /* Tabs */
  .subtabs { display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap; }
  .subtab {
    padding: 7px 14px; border: none; background: none; color: var(--text2);
    cursor: pointer; font-size: 0.85em; font-weight: 500; border-radius: 8px;
    transition: all 0.15s; font-family: inherit;
  }
  .subtab:hover { color: var(--text); background: var(--surface2); }
  .subtab.active { color: var(--accent-light); background: var(--accent-dim); }

  /* File upload area */
  .upload-area {
    border: 2px dashed var(--border); border-radius: 14px; padding: 40px; text-align: center;
    cursor: pointer; transition: all 0.2s; background: var(--surface2);
  }
  .upload-area:hover { border-color: var(--accent); background: var(--accent-dim); }
  .upload-area .upload-icon { font-size: 2.5em; margin-bottom: 10px; }
  .upload-area p { color: var(--text2); font-size: 0.9em; }

  /* Data table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.88em; }
  .data-table th {
    text-align: left; padding: 10px 14px; background: var(--surface2);
    color: var(--text2); font-weight: 600; font-size: 0.8em; text-transform: uppercase;
    letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 10px 14px; border-bottom: 1px solid rgba(42,48,80,0.3);
  }
  .data-table tr:hover td { background: var(--surface2); }

  /* Progress */
  .progress { background: var(--surface2); height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

  /* Eskalation badges */
  .esk-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px;
    border-radius: 20px; font-size: 0.75em; font-weight: 600;
  }
  .esk-sofort { background: var(--red-dim); color: var(--red); }
  .esk-woche { background: var(--yellow-dim); color: var(--yellow); }
  .esk-naechste { background: var(--green-dim); color: var(--green); }

  /* Iframe container */
  .iframe-wrap {
    border-radius: 14px; overflow: hidden; border: 1px solid var(--border);
    background: var(--bg);
  }
  .iframe-wrap iframe { width: 100%; height: 700px; border: none; }

  /* Scroll */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ============================================================
// DATE HELPERS
// ============================================================
const TODAY = new Date();
const DAY_NAMES = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const formatDate = (d) => `${d.getDate()}. ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
const dayName = (d) => DAY_NAMES[d.getDay()];
const getWeekDates = () => {
  const d = new Date(TODAY);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return Array.from({length: 5}, (_, i) => {
    const date = new Date(d);
    date.setDate(diff + i);
    return date;
  });
};

// ============================================================
// STORAGE HELPERS
// ============================================================
const STORE_KEY = 'ceo-siz-agent-data';
const loadData = () => {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
};
const saveData = (data) => {
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
};

// ============================================================
// CEO BRIEFING DATA (Template - dynamisch erweiterbar)
// ============================================================
const BRIEFING = {
  greeting: `Guten Morgen Franz. Heute ist ${dayName(TODAY)}, der ${formatDate(TODAY)}.`,
  focus: 'Strategische Partnerpflege und KPI-Analyse',
  alerts: [
    { type: 'yellow', icon: '⚡', text: 'Prüfungsvolumen KW14 liegt 8% unter Vorjahr – Analyse nötig' },
    { type: 'blue', icon: '📋', text: 'GL-Sitzung am Donnerstag – Vorbereitung starten' },
  ],
  taskOfDay: 'Erstelle eine Übersicht der 5 Partnerschulen mit dem grössten Rückgang im Prüfungsvolumen (letztes Quartal vs. Vorjahr). Für jede Schule: Volumen, Trend, mögliche Ursache, Massnahmenvorschlag.',
  questionOfDay: 'Was passiert mit unserem Geschäftsmodell, wenn KI-Tools wie Copilot ICT-Grundkenntnisse überflüssig machen? Welche Prüfungen werden dann WERTVOLLER statt wertloser?',
  kpiWatch: 'Prüfungsvolumen pro Partnerschule (Wochenvergleich)',
  schedule: [
    { time: '08:00–09:30', title: 'Deep Work: Partneranalyse', type: 'Strategie' },
    { time: '10:00–11:00', title: 'Call KV Zürich Business School', type: 'Partner' },
    { time: '11:30–12:00', title: 'E-Mails & Quick Responses', type: 'Admin' },
    { time: '13:30–14:30', title: 'Firmenkundenpilot: Offerte finalisieren', type: 'Akquise' },
    { time: '15:00–15:30', title: 'KPI-Check im Dashboard', type: 'Kontrolle' },
    { time: '16:00–16:30', title: 'Tagesreflexion & Vorbereitung morgen', type: 'Reflexion' },
  ],
};

// ============================================================
// KPI DATA
// ============================================================
const KPIS = [
  { icon: '📊', label: 'Prüfungen/Monat', value: '~8\'300', trend: '-5%', trendDir: 'down', target: '9\'000' },
  { icon: '🏫', label: 'Aktive Partner', value: '104', trend: '-2', trendDir: 'down', target: '110' },
  { icon: '💰', label: 'Revenue/Monat', value: '~280k', trend: '+2%', trendDir: 'up', target: '300k' },
  { icon: '📈', label: 'Rev/Partner', value: '~2\'700', trend: 'stabil', trendDir: 'neutral', target: '3\'000' },
  { icon: '😊', label: 'NPS Schulen', value: '42', trend: '+3', trendDir: 'up', target: '50' },
  { icon: '🔄', label: 'Churn Rate', value: '4.2%', trend: '-0.5%', trendDir: 'up', target: '<3%' },
  { icon: '🏢', label: 'Firmenkunden', value: '3', trend: '+2', trendDir: 'up', target: '10' },
  { icon: '🆕', label: 'Neue Partner YTD', value: '6', trend: 'on track', trendDir: 'neutral', target: '12' },
];

// ============================================================
// WEEKLY TASKS FROM CEO
// ============================================================
const WEEKLY_TASKS = [
  { text: 'Partneranalyse: Top-5 Schulen mit grösstem Volumenrückgang identifizieren und Massnahmenplan erstellen', priority: 'high', done: false },
  { text: 'GL-Sitzung vorbereiten: Quartalszahlen aufbereiten, 3 Entscheidungsvorlagen vorbereiten', priority: 'high', done: false },
  { text: 'Firmenkunden-Pilot: Offerte für Swisscom HR finalisieren und versenden', priority: 'medium', done: false },
  { text: 'KI-Zertifikat-Konzept: Erste Modulbeschreibung für "AI Literacy" skizzieren', priority: 'medium', done: false },
  { text: 'Wettbewerbsanalyse: ECDL/ICDL Preise und neue Angebote recherchieren', priority: 'medium', done: false },
  { text: 'Stakeholder-Kontakt: Telefonat mit Swico-Vertreter vereinbaren (Strategie-Update)', priority: 'low', done: false },
  { text: 'Reflexion: 30min CEO-Challenge im Chatbot (Thema: Pricing-Strategie)', priority: 'low', done: false },
];

// ============================================================
// MEETING PREP DATA
// ============================================================
const MEETINGS = [
  {
    time: 'Di 10:00', title: 'KV Zürich Business School',
    type: 'Partnerschule', borderColor: 'var(--blue)',
    context: 'Grösster Partner (~8000 Prüfungen/Jahr). Volumen seit 2 Quartalen rückläufig (-12%). Neue Schulleitung seit August 2025.',
    questions: [

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
